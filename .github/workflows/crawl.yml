name: "1 - Crawl Site for PDFs"

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "Full URL of the site to crawl (e.g. https://example.com)"
        required: true
        type: string
      timeout:
        description: "Maximum crawl time in seconds (default: 3600)"
        required: false
        default: "3600"
        type: string
      max_pages:
        description: "Maximum number of pages (URLs) to crawl (default: 2500)"
        required: false
        default: "2500"
        type: string
  issues:
    # 'opened'  – initial scan request
    # 'reopened'– allows restarting a failed scan by closing and reopening
    #             the issue (no 'edited' to avoid re-triggering on body updates)
    types: [opened, reopened]

permissions:
  contents: write
  issues: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: inform the issue author when their issue is not a scan request
  # ---------------------------------------------------------------------------
  note_not_scan_request:
    # Only fire for issues whose title does NOT match either recognised prefix.
    # workflow_dispatch runs skip this job entirely.
    if: >-
      github.event_name == 'issues' &&
      !startsWith(github.event.issue.title, 'SCAN:') &&
      !startsWith(github.event.issue.title, 'PDF-CRAWL:')
    runs-on: ubuntu-latest
    steps:
      - name: Log – not a scan request
        run: |
          echo "Issue #${{ github.event.issue.number }} (\"${{ github.event.issue.title }}\") does not start with 'SCAN:' or 'PDF-CRAWL:'."
          echo "No crawl will be started. To request a scan, open an issue whose title begins with 'SCAN: https://example.com'."

  # ---------------------------------------------------------------------------
  # Job 1: crawl the site for PDFs
  # ---------------------------------------------------------------------------
  crawl:
    # Run on manual dispatch, or when an issue title starts with "SCAN:" or
    # the legacy "PDF-CRAWL:" prefix.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (startsWith(github.event.issue.title, 'SCAN:') ||
        startsWith(github.event.issue.title, 'PDF-CRAWL:')))
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve crawl URL and timeout
        id: params
        # Use environment variables instead of inline ${{ }} interpolation to
        # avoid shell-injection from untrusted issue title / body content.
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_URL: ${{ github.event.inputs.site_url }}
          DISPATCH_TIMEOUT: ${{ github.event.inputs.timeout }}
          DISPATCH_MAX_PAGES: ${{ github.event.inputs.max_pages }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Helper: extract the first URL from a string.
          # Accepts full URLs (https://...) and bare domain names (example.com).
          extract_url() {
            local text="$1"
            # First try to find a full URL with protocol
            local url
            url=$(echo "$text" | grep -Eo 'https?://[^[:space:]]+' | head -1)
            if [ -n "$url" ]; then
              echo "$url"
              return
            fi
            # Fall back to a bare domain / path without protocol
            url=$(echo "$text" | grep -Eo '([[:alnum:]_-]+\.)+[[:alnum:]]{2,}(/[^[:space:]]*)?' | head -1)
            if [ -n "$url" ]; then
              echo "https://$url"
            fi
          }

          # Helper: extract a bare domain/path (no protocol) from a string.
          # Note: matches ASCII hostnames and common TLDs; IDNs are not supported.
          extract_bare_domain() {
            echo "$1" | grep -Eo '[a-zA-Z0-9][a-zA-Z0-9._-]*\.[a-zA-Z]{2,}[^[:space:]]*' | head -1
          }

          # Helper: check if a URL responds with an HTTP 2xx or 3xx status.
          # The 15-second per-probe timeout is intentionally conservative so that
          # all four variants can be tried within a reasonable wall-clock budget.
          url_ok() {
            local code
            code=$(curl -s --max-time 15 -L -o /dev/null -w "%{http_code}" "$1" 2>/dev/null || echo "000")
            [ "$code" -ge 200 ] && [ "$code" -lt 400 ]
          }

          # Helper: given a bare domain/path, probe protocol variants and return
          # the first working URL.  Falls back to https:// if none respond.
          resolve_bare_domain() {
            local domain="$1"
            local prefix
            for prefix in "https://" "https://www." "http://" "http://www."; do
              local candidate="${prefix}${domain}"
              echo "::debug::Probing $candidate" >&2
              if url_ok "$candidate"; then
                echo "$candidate"
                return 0
              fi
            done
            # No variant responded – return https:// and let the crawler handle it.
            echo "https://${domain}"
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "url=$DISPATCH_URL"            >> "$GITHUB_OUTPUT"
            echo "timeout=$DISPATCH_TIMEOUT"    >> "$GITHUB_OUTPUT"
            echo "max_pages=${DISPATCH_MAX_PAGES:-2500}" >> "$GITHUB_OUTPUT"
            echo "issue_number="                >> "$GITHUB_OUTPUT"
            echo "notes="                       >> "$GITHUB_OUTPUT"
          else
            # 1. Try to extract the URL from the issue title (after the prefix).
            STRIPPED=$(echo "$ISSUE_TITLE" \
              | sed -E 's/^(SCAN:|PDF-CRAWL:)[[:space:]]*//')
            URL=$(extract_url "$STRIPPED")

            # 2. If no protocol-prefixed URL found, check if the stripped title
            #    looks like a bare domain and probe protocol variants.
            if [ -z "$URL" ] && [ -n "$STRIPPED" ]; then
              BARE=$(extract_bare_domain "$STRIPPED")
              if [ -n "$BARE" ]; then
                echo "No protocol in title; probing variants for: $BARE"
                URL=$(resolve_bare_domain "$BARE")
              fi
            fi

            # 3. Fall back to the first URL found anywhere in the issue body.
            if [ -z "$URL" ]; then
              URL=$(extract_url "$ISSUE_BODY")
            fi

            # 4. If still no URL, try the issue body as a bare domain too.
            if [ -z "$URL" ] && [ -n "$ISSUE_BODY" ]; then
              BARE=$(extract_bare_domain "$ISSUE_BODY")
              if [ -n "$BARE" ]; then
                echo "No protocol in body; probing variants for: $BARE"
                URL=$(resolve_bare_domain "$BARE")
              fi
            fi

            if [ -z "$URL" ]; then
              echo "::error::No URL found in issue title or body. Please use 'SCAN: https://...' or 'SCAN: example.com' as the issue title."
              exit 1
            fi

            # 5. Extract optional notes from the **Notes:** line in the issue body.
            NOTES=""
            if [ -n "$ISSUE_BODY" ]; then
              NOTES=$(echo "$ISSUE_BODY" \
                | grep '^\*\*Notes:\*\* ' \
                | sed 's/^\*\*Notes:\*\* //' \
                | head -1 \
                | tr -d '\r' \
                | cut -c1-500)
            fi

            # 6. Extract optional page limit from the "Number: XXXX" line in the body.
            MAX_PAGES="2500"
            if [ -n "$ISSUE_BODY" ]; then
              PARSED_MAX=$(echo "$ISSUE_BODY" \
                | grep -Ei '^Number:[[:space:]]*[0-9]+' \
                | sed -E 's/^[Nn]umber:[[:space:]]*//' \
                | head -1 \
                | tr -d '\r[:space:]')
              if [ -n "$PARSED_MAX" ]; then
                MAX_PAGES="$PARSED_MAX"
              fi
            fi

            echo "url=$URL"                   >> "$GITHUB_OUTPUT"
            echo "timeout=3600"               >> "$GITHUB_OUTPUT"
            echo "max_pages=$MAX_PAGES"       >> "$GITHUB_OUTPUT"
            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "notes=$NOTES"               >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on issue when crawl setup fails
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v8
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `❌ **Scan failed** for issue: \`${title}\`.`,
                ``,
                `Could not extract a valid URL from the issue title or body.`,
                `Please use the format:`,
                `\`\`\``,
                `SCAN: https://example.com`,
                `\`\`\``,
                `If you provided a bare domain (e.g. \`SCAN: example.com\`), the`,
                `crawler will try to prepend \`https://\` automatically — but it`,
                `must be a recognizable hostname (e.g. \`example.com\`, not just`,
                `a word without a dot).`,
              ].join('\n')
            });
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['scan-failed']
              });
            } catch (_) {}

      - name: Acknowledge scan request on issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v8
        env:
          CRAWL_URL: ${{ steps.params.outputs.url }}
          IS_RESTART: ${{ github.event.action == 'reopened' }}
        with:
          script: |
            const url = process.env.CRAWL_URL;
            const isRestart = process.env.IS_RESTART === 'true';

            // Remove scan-failed label if present (e.g. when restarting after a failure)
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'scan-failed'
              });
            } catch (err) {
              if (err.status !== 404) throw err;
            }

            const commentLines = isRestart
              ? [
                  `🔄 **Scan restarted** for \`${url}\`.`,
                  ``,
                  `The previous scan failed and this issue was reopened to retry. The site will be re-crawled for PDF files.`,
                  ``,
                  `_No further edits to this issue will trigger additional scans._`
                ]
              : [
                  `🔍 **Crawl started** for \`${url}\`.`,
                  ``,
                  `This workflow will crawl the site for PDF files. Once complete, accessibility analysis will begin automatically.`,
                  ``,
                  `_No further edits to this issue will trigger additional scans._`
                ];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentLines.join('\n')
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['scan-in-progress']
            });

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Pull latest manifest
        run: |
          git pull --rebase origin "${{ github.ref_name }}" || true

      - name: Run PDF crawler
        env:
          CRAWL_URL: ${{ steps.params.outputs.url }}
          CRAWL_TIMEOUT: ${{ steps.params.outputs.timeout }}
          CRAWL_MAX_PAGES: ${{ steps.params.outputs.max_pages }}
          CRAWL_NOTES: ${{ steps.params.outputs.notes }}
        run: |
          NOTES_ARGS=()
          if [ -n "$CRAWL_NOTES" ]; then
            NOTES_ARGS=(--notes "$CRAWL_NOTES")
          fi
          python scripts/crawl.py \
            --url "$CRAWL_URL" \
            --manifest reports/manifest.yaml \
            --output-dir crawled_files \
            --report-dir reports \
            --timeout "$CRAWL_TIMEOUT" \
            --max-pages "$CRAWL_MAX_PAGES" \
            "${NOTES_ARGS[@]}"

      - name: Commit updated manifest
        env:
          CRAWL_URL:       ${{ steps.params.outputs.url }}
          CRAWL_NOTES:     ${{ steps.params.outputs.notes }}
          CRAWL_MAX_PAGES: ${{ steps.params.outputs.max_pages }}
          GIT_BRANCH:      ${{ github.ref_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f reports/manifest.yaml ]    && git add reports/manifest.yaml    || true
          [ -f reports/crawled_urls.csv ] && git add reports/crawled_urls.csv || true
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: update manifest after crawl of $CRAWL_URL"
            # Retry push up to 5 times to handle concurrent manifest updates.
            # On conflict, reset to the remote HEAD and re-merge our crawl entries
            # on top using --skip-crawl (crawled_files/ is still on disk).
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "Push succeeded on attempt $attempt."
                break
              fi
              echo "Push attempt $attempt failed – rebasing on latest remote…"
              # Clean up any in-progress rebase before fetching
              git rebase --abort 2>/dev/null || true
              # Fetch the latest remote state
              git fetch origin "$GIT_BRANCH"
              # Discard our local commit and reset to the remote HEAD.
              # crawled_files/ is untracked (.gitignore) so it is preserved.
              git reset --hard "origin/$GIT_BRANCH"
              # Re-apply our manifest entries on top of the fresh remote state
              # without re-running the expensive Scrapy crawl.
              NOTES_ARGS=()
              if [ -n "$CRAWL_NOTES" ]; then
                NOTES_ARGS=(--notes "$CRAWL_NOTES")
              fi
              python scripts/crawl.py \
                --url "$CRAWL_URL" \
                --manifest reports/manifest.yaml \
                --output-dir crawled_files \
                --report-dir reports \
                --max-pages "$CRAWL_MAX_PAGES" \
                --skip-crawl \
                "${NOTES_ARGS[@]}"
              # Stage and re-commit the freshly merged manifest
              [ -f reports/manifest.yaml ]    && git add reports/manifest.yaml    || true
              [ -f reports/crawled_urls.csv ] && git add reports/crawled_urls.csv || true
              if git diff --cached --quiet; then
                echo "No manifest changes after merge – nothing to push."
                break
              fi
              git commit -m "chore: update manifest after crawl of $CRAWL_URL"
            done
          fi

      - name: Save scan metadata for the analysis workflow
        if: always()
        env:
          ISSUE_NUMBER:    ${{ steps.params.outputs.issue_number }}
          CRAWL_URL:       ${{ steps.params.outputs.url }}
          CRAWL_NOTES:     ${{ steps.params.outputs.notes }}
          CRAWL_MAX_PAGES: ${{ steps.params.outputs.max_pages }}
        run: |
          mkdir -p scan-meta
          echo "$ISSUE_NUMBER"    > scan-meta/issue_number.txt
          echo "$CRAWL_URL"       > scan-meta/crawl_url.txt
          echo "$CRAWL_NOTES"     > scan-meta/notes.txt
          echo "$CRAWL_MAX_PAGES" > scan-meta/max_pages.txt
          # Extract and save the site/domain for per-site scoping in the analysis step.
          # This mirrors the _site_folder() helper in scripts/crawl.py: lowercase the
          # netloc and strip a leading www. prefix (e.g. www.Ontario.ca → ontario.ca).
          python3 -c "
          from urllib.parse import urlparse
          import os
          url = os.environ.get('CRAWL_URL', '')
          netloc = urlparse(url).netloc.lower()
          print(netloc.removeprefix('www.'))
          " > scan-meta/crawl_site.txt

      - name: Upload crawled files as artifact
        uses: actions/upload-artifact@v7
        with:
          name: crawled-pdfs-${{ github.run_id }}
          path: crawled_files/
          retention-days: 1
          if-no-files-found: warn

      - name: Upload scan metadata as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scan-meta-${{ github.run_id }}
          path: scan-meta/
          retention-days: 1

      - name: Comment crawl complete on issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v8
        env:
          CRAWL_URL: ${{ steps.params.outputs.url }}
        with:
          script: |
            const url = process.env.CRAWL_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Crawl complete** for \`${url}\`.\n\nThe manifest has been updated. Accessibility analysis is now running automatically and results will be posted here when ready.`
            });

      - name: Comment on issue when scan is cancelled or times out
        if: cancelled() && github.event_name == 'issues'
        uses: actions/github-script@v8
        env:
          CRAWL_URL:        ${{ steps.params.outputs.url }}
          CRAWL_MAX_PAGES:  ${{ steps.params.outputs.max_pages }}
          RUN_URL:          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const crawlUrl        = process.env.CRAWL_URL || '(unknown)';
            const runUrl          = process.env.RUN_URL;
            const currentMaxPages = parseInt(process.env.CRAWL_MAX_PAGES, 10) || 2500;
            const newMaxPages     = Math.max(100, Math.floor(currentMaxPages / 2));

            // Update the issue body to reduce the Number: capture limit so that
            // a retry is more likely to complete within the time budget.
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            let body = issue.body || '';
            if (/^Number:\s*\d+/mi.test(body)) {
              body = body.replace(/^Number:\s*\d+/mi, `Number: ${newMaxPages}`);
            } else {
              body = body.trim() + `\nNumber: ${newMaxPages}`;
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `❌ **Scan timed out** for \`${crawlUrl}\`.`,
                ``,
                `The workflow exceeded the time limit and was cancelled.`,
                `Please check the [workflow run](${runUrl}) for details.`,
                ``,
                `To help the next attempt succeed, the capture limit has been automatically`,
                `reduced to **${newMaxPages} pages** (was ${currentMaxPages}).`,
                `Close and reopen this issue to retry with the smaller batch size.`,
              ].join('\n'),
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'scan-in-progress',
              });
            } catch (err) {
              if (err.status !== 404) throw err;
            }
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['scan-failed'],
              });
            } catch (_) {}
