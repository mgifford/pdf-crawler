name: "2 - Analyse PDFs for Accessibility"

on:
  workflow_dispatch:
    inputs:
      keep_files:
        description: "Keep downloaded PDF files after analysis (default: false)"
        required: false
        default: "false"
        type: string
  workflow_run:
    workflows: ["1 - Crawl Site for PDFs"]
    types: [completed]

permissions:
  contents: write
  issues: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: explain why the crawl was skipped (non-scan issue or title mismatch)
  # ---------------------------------------------------------------------------
  note_crawl_skipped:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Log – crawl workflow was skipped
        run: |
          echo "The crawl workflow run ${{ github.event.workflow_run.id }} concluded with 'skipped'."
          echo "This typically means the triggering issue title did not start with 'SCAN:' or 'PDF-CRAWL:'."
          echo "No analysis is needed. This is expected behaviour for non-scan issues."

  # ---------------------------------------------------------------------------
  # Job 1: report a failed upstream crawl back to the originating issue
  # ---------------------------------------------------------------------------
  report_crawl_failure:
    if: >-
      github.event_name == 'workflow_run' &&
      (github.event.workflow_run.conclusion == 'failure' ||
       github.event.workflow_run.conclusion == 'cancelled')
    runs-on: ubuntu-latest

    steps:
      - name: Download scan metadata artifact
        id: download_meta
        continue-on-error: true   # artifact may not exist if crawl failed very early
        uses: actions/download-artifact@v8
        with:
          name: scan-meta-${{ github.event.workflow_run.id }}
          path: scan-meta/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read scan metadata
        id: meta
        run: |
          ISSUE_NUMBER=""
          CRAWL_URL=""
          if [ -f scan-meta/issue_number.txt ]; then
            ISSUE_NUMBER=$(cat scan-meta/issue_number.txt | tr -d '[:space:]')
          fi
          if [ -f scan-meta/crawl_url.txt ]; then
            CRAWL_URL=$(cat scan-meta/crawl_url.txt | tr -d '[:space:]')
          fi
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "crawl_url=$CRAWL_URL"       >> "$GITHUB_OUTPUT"

      - name: Comment crawl failure on issue
        if: steps.meta.outputs.issue_number != ''
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
          CRAWL_URL: ${{ steps.meta.outputs.crawl_url }}
          CRAWL_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
            const crawlUrl  = process.env.CRAWL_URL  || '(unknown)';
            const runUrl    = process.env.CRAWL_RUN_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issueNumber,
              body: [
                `❌ **Crawl failed** for \`${crawlUrl}\`.`,
                ``,
                `The crawl workflow did not complete successfully.`,
                `Please check the [workflow run](${runUrl}) for details.`,
                ``,
                `Common causes:`,
                `- The URL is not reachable`,
                `- A timeout was exceeded`,
                `- An unexpected error occurred during crawling`,
              ].join('\n')
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issueNumber,
                name: 'scan-in-progress'
              });
            } catch (err) {
              if (err.status !== 404) throw err;
            }
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issueNumber,
                labels: ['scan-failed']
              });
            } catch (_) {}

  # ---------------------------------------------------------------------------
  # Job 2: run accessibility analysis for a successful crawl
  # ---------------------------------------------------------------------------
  analyse:
    # When triggered by workflow_run, only run if the crawl succeeded
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Debug – log triggering workflow context
        run: |
          echo "=== Triggering event ==="
          echo "Event name:            ${{ github.event_name }}"
          echo "Workflow run ID:       ${{ github.event.workflow_run.id }}"
          echo "Workflow run name:     ${{ github.event.workflow_run.name }}"
          echo "Workflow run status:   ${{ github.event.workflow_run.status }}"
          echo "Workflow run conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Workflow run HTML URL: ${{ github.event.workflow_run.html_url }}"
          echo "Head branch:           ${{ github.event.workflow_run.head_branch }}"
          echo "Head SHA:              ${{ github.event.workflow_run.head_sha }}"
          echo "This run ID:           ${{ github.run_id }}"
          echo "Ref:                   ${{ github.ref_name }}"
          echo "Artifact names expected:"
          echo "  crawled-pdfs-${{ github.event.workflow_run.id }}"
          echo "  scan-meta-${{ github.event.workflow_run.id }}"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download crawled PDFs artifact
        id: download_pdfs
        if: github.event_name == 'workflow_run'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: crawled-pdfs-${{ github.event.workflow_run.id }}
          path: crawled_files/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download scan metadata artifact
        id: download_meta
        if: github.event_name == 'workflow_run'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: scan-meta-${{ github.event.workflow_run.id }}
          path: scan-meta/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Debug – check downloaded artifacts
        if: github.event_name == 'workflow_run'
        run: |
          echo "=== PDF artifact download outcome: ${{ steps.download_pdfs.outcome }} ==="
          echo "=== Metadata artifact download outcome: ${{ steps.download_meta.outcome }} ==="
          echo ""
          echo "--- crawled_files/ ---"
          if [ -d crawled_files ]; then
            find crawled_files -type f | sort || echo "(directory is empty)"
          else
            echo "(directory does not exist)"
          fi
          echo ""
          echo "--- scan-meta/ ---"
          if [ -d scan-meta ]; then
            ls -la scan-meta/ || echo "(directory is empty)"
            for f in scan-meta/*.txt; do
              [ -f "$f" ] && echo "  $f: $(cat "$f")"
            done
          else
            echo "(directory does not exist)"
          fi
          echo ""
          if [ "${{ steps.download_pdfs.outcome }}" = "failure" ]; then
            echo "::warning::PDF artifact 'crawled-pdfs-${{ github.event.workflow_run.id }}' was not found."
            echo "::warning::This may mean the crawl produced no PDF files, the artifact expired, or the crawl run ID is mismatched."
          fi
          if [ "${{ steps.download_meta.outcome }}" = "failure" ]; then
            echo "::warning::Scan metadata artifact 'scan-meta-${{ github.event.workflow_run.id }}' was not found."
          fi

      - name: Read scan metadata
        id: meta
        if: github.event_name == 'workflow_run'
        run: |
          ISSUE_NUMBER=""
          CRAWL_URL=""
          CRAWL_SITE=""
          MAX_PAGES="500"
          MAX_PDFS="200"
          RUN_VERAPDF="false"
          if [ -f scan-meta/issue_number.txt ]; then
            ISSUE_NUMBER=$(cat scan-meta/issue_number.txt | tr -d '[:space:]')
          fi
          if [ -f scan-meta/crawl_url.txt ]; then
            CRAWL_URL=$(cat scan-meta/crawl_url.txt | tr -d '[:space:]')
          fi
          if [ -f scan-meta/crawl_site.txt ]; then
            CRAWL_SITE=$(cat scan-meta/crawl_site.txt | tr -d '[:space:]')
          fi
          if [ -f scan-meta/max_pages.txt ]; then
            PARSED=$(cat scan-meta/max_pages.txt | tr -d '[:space:]')
            if echo "$PARSED" | grep -Eq '^[0-9]+$'; then
              MAX_PAGES="$PARSED"
            fi
          fi
          if [ -f scan-meta/max_pdfs.txt ]; then
            PARSED=$(cat scan-meta/max_pdfs.txt | tr -d '[:space:]')
            if echo "$PARSED" | grep -Eq '^[0-9]+$'; then
              MAX_PDFS="$PARSED"
            fi
          fi
          if [ -f scan-meta/verapdf.txt ]; then
            PARSED=$(cat scan-meta/verapdf.txt | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
            if [ "$PARSED" = "true" ]; then
              RUN_VERAPDF="true"
            fi
          fi
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "crawl_url=$CRAWL_URL"       >> "$GITHUB_OUTPUT"
          echo "crawl_site=$CRAWL_SITE"     >> "$GITHUB_OUTPUT"
          echo "max_pages=$MAX_PAGES"       >> "$GITHUB_OUTPUT"
          echo "max_pdfs=$MAX_PDFS"         >> "$GITHUB_OUTPUT"
          echo "run_verapdf=$RUN_VERAPDF"   >> "$GITHUB_OUTPUT"

      - name: Pull latest manifest
        run: |
          git pull --rebase origin "${{ github.ref_name }}" || true

      - name: Install veraPDF
        # Only install when the scan requested it (veraPDF/VERAPDF in issue title).
        # The uber-JAR greenfield-apps-<version>.jar is published to Maven Central
        # at org.verapdf.apps:greenfield-apps.  We download it and create a thin
        # wrapper script so that `verapdf` is available on PATH.
        # Update VERAPDF_VERSION when a new stable release is published to Maven
        # Central (https://repo1.maven.org/maven2/org/verapdf/apps/greenfield-apps/).
        if: steps.meta.outputs.run_verapdf == 'true'
        run: |
          sudo apt-get install -y --no-install-recommends default-jre-headless
          VERAPDF_VERSION="1.28.2"
          MAVEN_BASE="https://repo1.maven.org/maven2/org/verapdf/apps/greenfield-apps"
          mkdir -p /tmp/verapdf-install
          curl -fsSL \
            "${MAVEN_BASE}/${VERAPDF_VERSION}/greenfield-apps-${VERAPDF_VERSION}.jar" \
            -o /tmp/verapdf-install/greenfield-apps.jar
          # Create a thin wrapper script so `verapdf` is on PATH
          printf '#!/bin/sh\nexec java -cp /tmp/verapdf-install/greenfield-apps.jar org.verapdf.apps.GreenfieldCliWrapper "$@"\n' \
            > /tmp/verapdf-install/verapdf
          chmod +x /tmp/verapdf-install/verapdf
          echo "/tmp/verapdf-install" >> "$GITHUB_PATH"
          echo "veraPDF installed (Maven Central, v${VERAPDF_VERSION})"
          /tmp/verapdf-install/verapdf --version || true

      - name: Analyse PDFs for accessibility issues
        env:
          CRAWL_SITE:      ${{ steps.meta.outputs.crawl_site }}
          CRAWL_MAX_PAGES: ${{ steps.meta.outputs.max_pages }}
          CRAWL_MAX_PDFS:  ${{ steps.meta.outputs.max_pdfs }}
          RUN_VERAPDF:     ${{ steps.meta.outputs.run_verapdf }}
        run: |
          KEEP_FLAG=""
          if [ "${{ github.event.inputs.keep_files }}" = "true" ]; then
            KEEP_FLAG="--keep-files"
          fi
          SITE_FLAG=""
          if [ -n "$CRAWL_SITE" ]; then
            SITE_FLAG="--site $CRAWL_SITE"
          fi
          # Always cap the number of PDFs analysed per run to stay within the
          # job time budget. Use the max_pdfs value from the crawl metadata
          # (defaults to 200 when not explicitly set by the submitter).
          MAX_PDFS="${CRAWL_MAX_PDFS:-200}"
          if [ -z "$MAX_PDFS" ] || ! echo "$MAX_PDFS" | grep -Eq '^[0-9]+$'; then
            MAX_PDFS="200"
          fi
          MAX_FILES_FLAG="--max-files $MAX_PDFS"
          VERAPDF_FLAG=""
          if [ "$RUN_VERAPDF" = "true" ]; then
            VERAPDF_FLAG="--verapdf"
          fi
          python scripts/pdf_analyser.py \
            --manifest reports/manifest.yaml \
            --crawled-dir crawled_files \
            --max-age-days 2 \
            --total-timeout 2400 \
            $SITE_FLAG \
            $MAX_FILES_FLAG \
            $VERAPDF_FLAG \
            $KEEP_FLAG

      - name: Generate accessibility reports
        env:
          CRAWL_URL: ${{ steps.meta.outputs.crawl_url }}
          CRAWL_SITE: ${{ steps.meta.outputs.crawl_site }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          PAGES_BASE="https://${REPO_OWNER}.github.io/${REPO_NAME}"
          RUN_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}/actions/runs/${RUN_ID}"
          SITE_FLAG=""
          COMMENT_FLAG=""
          if [ -n "$CRAWL_SITE" ]; then
            SITE_FLAG="--site $CRAWL_SITE"
            COMMENT_FLAG="--issue-comment-file /tmp/issue_comment.md"
          fi
          CRAWLED_DIR_FLAG=""
          if [ -d crawled_files ]; then
            CRAWLED_DIR_FLAG="--crawled-dir crawled_files"
          fi
          python scripts/generate_report.py \
            --manifest reports/manifest.yaml \
            --report-dir reports \
            $SITE_FLAG \
            $COMMENT_FLAG \
            $CRAWLED_DIR_FLAG \
            --html-dir docs \
            --archive-dir docs/reports \
            --pages-base "$PAGES_BASE" \
            --run-url "$RUN_URL" \
            --crawl-url "$CRAWL_URL"

      - name: Commit updated manifest and reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Copy crawled_urls.csv to docs/reports for GitHub Pages access
          if [ -f reports/crawled_urls.csv ]; then
            cp reports/crawled_urls.csv docs/reports/crawled_urls.csv
          fi
          git add reports/ docs/report.html docs/reports.html docs/reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update accessibility reports"
            # Retry push up to 3 times to handle concurrent report commits.
            # Use git merge -X ours so that conflicts in generated report files
            # are automatically resolved in favour of the freshly produced
            # reports from this run; manifest.yaml auto-merges cleanly because
            # each run modifies distinct URL entries.
            PUSH_DONE=false
            for attempt in 1 2 3; do
              if git push; then
                PUSH_DONE=true
                break
              fi
              echo "Push attempt $attempt failed – fetching and merging (ours) then retrying…"
              git fetch origin "${{ github.ref_name }}"
              git merge --no-edit -X ours FETCH_HEAD || { echo "::warning::Merge failed on attempt $attempt; aborting."; git merge --abort 2>/dev/null || true; }
            done
            if [ "$PUSH_DONE" = "false" ]; then
              git push || echo "::warning::All push attempts exhausted; reports saved as workflow artifact."
            fi
          fi

      - name: Upload accessibility report as artifact
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-report
          path: |
            reports/report.md
            reports/report.json
            reports/report.csv
            reports/crawled_urls.csv
            reports/manifest.yaml
          retention-days: 30

      - name: Comment analysis results on issue
        id: comment
        if: >-
          github.event_name == 'workflow_run' &&
          steps.meta.outputs.issue_number != ''
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
          CRAWL_URL: ${{ steps.meta.outputs.crawl_url }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.warning(`Skipping issue comment: invalid issue number '${process.env.ISSUE_NUMBER}'.`);
              return;
            }
            const crawlUrl  = process.env.CRAWL_URL;
            const repoOwner = process.env.REPO_OWNER;
            const repoName  = process.env.REPO_NAME;
            const runId     = process.env.RUN_ID;

            const reportsBase = `https://${repoOwner}.github.io/${repoName}`;
            const actionsUrl  = `https://github.com/${repoOwner}/${repoName}/actions/runs/${runId}`;

            // Use the pre-generated per-site comment body if available;
            // otherwise fall back to a brief summary with links.
            let body;
            try {
              const fs = require('fs');
              body = fs.readFileSync('/tmp/issue_comment.md', 'utf8');
            } catch (_) {
              body = [
                `📊 **Accessibility analysis complete** for \`${crawlUrl}\`.`,
                ``,
                `**Reports:**`,
                `- [HTML report](${reportsBase}/report.html)`,
                `- [Reports history](${reportsBase}/reports.html)`,
                `- [Markdown report](${reportsBase}/reports/report.md)`,
                `- [JSON report](${reportsBase}/reports/report.json)`,
                `- [YAML manifest](${reportsBase}/reports/manifest.yaml)`,
                ``,
                `[View workflow run](${actionsUrl})`
              ].join('\n');
            }

            const { data: commentData } = await github.rest.issues.createComment({
              owner: repoOwner,
              repo:  repoName,
              issue_number: issueNumber,
              body,
            });

            core.setOutput('comment_url', commentData.html_url);

            // Replace the in-progress label with a completed label.
            try {
              await github.rest.issues.removeLabel({
                owner: repoOwner,
                repo:  repoName,
                issue_number: issueNumber,
                name: 'scan-in-progress'
              });
            } catch (err) {
              if (err.status !== 404) throw err;
            }

            await github.rest.issues.addLabels({
              owner: repoOwner,
              repo:  repoName,
              issue_number: issueNumber,
              labels: ['scan-complete']
            });

      - name: Link issue comment URL to reports index
        if: >-
          github.event_name == 'workflow_run' &&
          steps.meta.outputs.issue_number != '' &&
          steps.comment.outputs.comment_url != ''
        env:
          COMMENT_URL: ${{ steps.comment.outputs.comment_url }}
          CRAWL_SITE:  ${{ steps.meta.outputs.crawl_site }}
        run: |
          python3 - << 'PYEOF'
          import json, os, sys
          from pathlib import Path

          archive_dir = 'docs/reports'
          site        = os.environ.get('CRAWL_SITE', '').strip()
          comment_url = os.environ.get('COMMENT_URL', '').strip()

          if not site or not comment_url:
              print('Skipping: CRAWL_SITE or COMMENT_URL is empty.')
              sys.exit(0)

          index_path = Path(archive_dir) / 'index.json'
          if not index_path.exists():
              print(f'Skipping: {index_path} does not exist.')
              sys.exit(0)

          data = json.loads(index_path.read_text(encoding='utf-8'))
          updated = False
          for entry in data:
              if entry.get('site') == site and not entry.get('issue_url'):
                  entry['issue_url'] = comment_url
                  updated = True
                  break

          if updated:
              index_path.write_text(
                  json.dumps(data, indent=2, default=str), encoding='utf-8'
              )
              print(f'Updated index.json: issue_url={comment_url!r} for site={site!r}')
          else:
              print(f'No matching entry without issue_url found for site={site!r}')
          PYEOF
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reports/index.json
          if git diff --cached --quiet; then
            echo "No index changes to commit."
          else
            git commit -m "chore: link issue comment to reports index"
            PUSH_DONE=false
            for attempt in 1 2 3; do
              if git push; then
                PUSH_DONE=true
                break
              fi
              echo "Push attempt $attempt failed – pulling and retrying…"
              git pull --rebase origin "${{ github.ref_name }}" || { echo "::warning::Rebase failed on attempt $attempt; aborting."; git rebase --abort 2>/dev/null || true; }
            done
            if [ "$PUSH_DONE" = "false" ]; then
              git push || echo "::warning::All push attempts exhausted."
            fi
          fi

      - name: Close issue after scan and report
        if: >-
          github.event_name == 'workflow_run' &&
          steps.meta.outputs.issue_number != ''
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
            await github.rest.issues.update({
              owner: process.env.REPO_OWNER,
              repo:  process.env.REPO_NAME,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed',
            });

      # -----------------------------------------------------------------------
      # Runs only when the job is cancelled (e.g. 60-minute job timeout).
      # Clears the scan-in-progress label and marks the issue scan-failed so
      # the issue does not remain permanently stuck with no visible status.
      # Also reduces the PDFs: limit in the issue body so a retry is more
      # likely to complete within the time budget.
      # -----------------------------------------------------------------------
      - name: Handle analysis cancellation or timeout
        if: >-
          cancelled() &&
          github.event_name == 'workflow_run' &&
          steps.meta.outputs.issue_number != ''
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER:  ${{ steps.meta.outputs.issue_number }}
          CRAWL_URL:     ${{ steps.meta.outputs.crawl_url }}
          CRAWL_MAX_PDFS: ${{ steps.meta.outputs.max_pdfs }}
          RUN_URL:       https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
            const crawlUrl   = process.env.CRAWL_URL || '(unknown)';
            const runUrl     = process.env.RUN_URL;
            const currentMax = parseInt(process.env.CRAWL_MAX_PDFS, 10) || 200;
            const newMax     = Math.max(25, Math.floor(currentMax / 2));

            // Update the issue body to reduce the PDFs: limit so that a retry
            // is more likely to complete within the time budget.
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issueNumber,
            });
            let body = issue.body || '';
            if (/^PDFs:\s*\d+/mi.test(body)) {
              body = body.replace(/^PDFs:\s*\d+/mi, `PDFs: ${newMax}`);
            } else {
              body = body.trim() + `\nPDFs: ${newMax}`;
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issueNumber,
              body,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issueNumber,
              body: [
                `⏱️ **Analysis timed out** for \`${crawlUrl}\`.`,
                ``,
                `The accessibility analysis job exceeded its time limit and was cancelled.`,
                `Please check the [workflow run](${runUrl}) for details.`,
                ``,
                `To help the next attempt succeed, the PDF analysis limit has been automatically`,
                `reduced to **${newMax} PDFs** (was ${currentMax}).`,
                `Close and reopen this issue to retry with the smaller batch size.`,
              ].join('\n'),
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issueNumber,
                name: 'scan-in-progress',
              });
            } catch (err) {
              if (err.status !== 404) throw err;
            }
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issueNumber,
                labels: ['scan-failed'],
              });
            } catch (_) {}
