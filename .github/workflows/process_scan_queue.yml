name: "3 - Process Scan Queue"

# Processes all open "SCAN:" / "PDF-CRAWL:" issues one at a time.
# Trigger this manually to "clear the queue" without running concurrent scans.

on:
  workflow_dispatch:
    inputs:
      fail_fast:
        description: "Stop processing the queue on first failure (default: false)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Only one queue run may execute at a time; new runs wait rather than cancel.
concurrency:
  group: scan-queue
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: find every open "SCAN:" / "PDF-CRAWL:" issue and build the queue
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      issue_numbers: ${{ steps.list.outputs.issue_numbers }}
      issue_count: ${{ steps.list.outputs.issue_count }}

    steps:
      - name: Find open scan issues and mark them as queued
        id: list
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch all open issues (paginated).
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            // Keep only non-PR issues whose title begins with a recognised prefix.
            const scanIssues = issues
              .filter(i =>
                !i.pull_request &&
                (i.title.startsWith('SCAN:') || i.title.startsWith('PDF-CRAWL:'))
              )
              .sort((a, b) => a.number - b.number); // oldest first

            const numbers = scanIssues.map(i => i.number);
            core.setOutput('issue_numbers', JSON.stringify(numbers));
            core.setOutput('issue_count', String(numbers.length));
            core.info(`Found ${numbers.length} open scan issue(s): ${numbers.join(', ') || '(none)'}`);

            if (numbers.length === 0) return;

            // Ensure the scan-queued label exists (create silently if absent).
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'scan-queued',
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name:  'scan-queued',
                  color: 'e4e669',
                  description: 'Issue is waiting in the scan queue',
                });
              }
            }

            // Label every queued issue and leave an informational comment.
            for (let idx = 0; idx < scanIssues.length; idx++) {
              const issue = scanIssues[idx];
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  labels: ['scan-queued'],
                });
              } catch (_) {}

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body: [
                  `🕐 **Scan queued** (position ${idx + 1} of ${numbers.length}).`,
                  ``,
                  `This issue has been added to the processing queue.`,
                  `Scans run one at a time to avoid conflicts.`,
                  `Results will be posted here when this scan completes.`,
                ].join('\n'),
              });
            }

      - name: Log – nothing to process
        if: steps.list.outputs.issue_count == '0'
        run: echo "No open scan issues found. Nothing to do."

  # ---------------------------------------------------------------------------
  # Job 2: process each issue sequentially (max-parallel: 1)
  # ---------------------------------------------------------------------------
  process:
    needs: prepare
    if: needs.prepare.outputs.issue_numbers != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      # Process issues one at a time so scans never run concurrently.
      max-parallel: 1
      # Honour the fail_fast input: when true, cancel remaining issues on
      # first failure; when false (default) the queue continues regardless.
      fail-fast: ${{ github.event.inputs.fail_fast == 'true' }}
      matrix:
        issue_number: ${{ fromJson(needs.prepare.outputs.issue_numbers) }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Fetch the current state of the issue
      # -----------------------------------------------------------------------
      - name: Fetch issue details
        id: issue
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ matrix.issue_number }}
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER, 10),
            });
            core.setOutput('title', issue.title);
            core.setOutput('body',  issue.body || '');
            core.setOutput('state', issue.state);

      # -----------------------------------------------------------------------
      # 2. Skip issues that were closed while we were waiting in the queue
      # -----------------------------------------------------------------------
      - name: Skip closed issues
        if: steps.issue.outputs.state != 'open'
        run: |
          echo "Issue #${{ matrix.issue_number }} is no longer open – skipping."

      # -----------------------------------------------------------------------
      # 3. Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        if: steps.issue.outputs.state == 'open'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 4. Resolve the crawl URL from the issue title / body
      # -----------------------------------------------------------------------
      - name: Resolve crawl URL
        if: steps.issue.outputs.state == 'open'
        id: params
        env:
          ISSUE_TITLE:  ${{ steps.issue.outputs.title }}
          ISSUE_BODY:   ${{ steps.issue.outputs.body }}
          ISSUE_NUMBER: ${{ matrix.issue_number }}
        run: |
          # Helper: extract the first URL from a string.
          extract_url() {
            local text="$1"
            local url
            url=$(echo "$text" | grep -Eo 'https?://[^[:space:]]+' | head -1)
            if [ -n "$url" ]; then
              echo "$url"; return
            fi
            url=$(echo "$text" | grep -Eo '([[:alnum:]_-]+\.)+[[:alnum:]]{2,}(/[^[:space:]]*)?' | head -1)
            if [ -n "$url" ]; then
              echo "https://$url"
            fi
          }

          extract_bare_domain() {
            echo "$1" | grep -Eo '[a-zA-Z0-9][a-zA-Z0-9._-]*\.[a-zA-Z]{2,}[^[:space:]]*' | head -1
          }

          url_ok() {
            local code
            code=$(curl -s --max-time 15 -L -o /dev/null -w "%{http_code}" "$1" 2>/dev/null || echo "000")
            [ "$code" -ge 200 ] && [ "$code" -lt 400 ]
          }

          resolve_bare_domain() {
            local domain="$1"
            local prefix
            for prefix in "https://" "https://www." "http://" "http://www."; do
              local candidate="${prefix}${domain}"
              echo "::debug::Probing $candidate" >&2
              if url_ok "$candidate"; then
                echo "$candidate"; return 0
              fi
            done
            echo "https://${domain}"
          }

          # 1. Strip the recognised prefix from the title.
          STRIPPED=$(echo "$ISSUE_TITLE" \
            | sed -E 's/^(SCAN:|PDF-CRAWL:)[[:space:]]*//')
          URL=$(extract_url "$STRIPPED")

          # 2. Try bare-domain resolution if no protocol was found in the title.
          if [ -z "$URL" ] && [ -n "$STRIPPED" ]; then
            BARE=$(extract_bare_domain "$STRIPPED")
            if [ -n "$BARE" ]; then
              echo "No protocol in title; probing variants for: $BARE"
              URL=$(resolve_bare_domain "$BARE")
            fi
          fi

          # 3. Fall back to the first URL found anywhere in the issue body.
          if [ -z "$URL" ]; then
            URL=$(extract_url "$ISSUE_BODY")
          fi

          # 4. Try the issue body as a bare domain too.
          if [ -z "$URL" ] && [ -n "$ISSUE_BODY" ]; then
            BARE=$(extract_bare_domain "$ISSUE_BODY")
            if [ -n "$BARE" ]; then
              echo "No protocol in body; probing variants for: $BARE"
              URL=$(resolve_bare_domain "$BARE")
            fi
          fi

          if [ -z "$URL" ]; then
            echo "::error::No URL found in issue #${ISSUE_NUMBER}. Skipping."
            echo "url="          >> "$GITHUB_OUTPUT"
            echo "skip=true"     >> "$GITHUB_OUTPUT"
          else
            # Extract the site/domain (mirrors _site_folder() in crawl.py).
            SITE=$(PARSE_URL="$URL" python3 -c "
          from urllib.parse import urlparse
          import os
          netloc = urlparse(os.environ['PARSE_URL']).netloc.lower()
          print(netloc.removeprefix('www.'))
          ")
            # Extract optional notes from a **Notes:** line in the issue body.
            NOTES=""
            if [ -n "$ISSUE_BODY" ]; then
              NOTES=$(echo "$ISSUE_BODY" \
                | grep '^\*\*Notes:\*\* ' \
                | sed 's/^\*\*Notes:\*\* //' \
                | head -1 \
                | tr -d '\r' \
                | cut -c1-500)
            fi
            # Extract optional page limit from the "Number: XXXX" line in the body.
            MAX_PAGES="2500"
            if [ -n "$ISSUE_BODY" ]; then
              PARSED_MAX=$(echo "$ISSUE_BODY" \
                | grep -Ei '^Number:[[:space:]]*[0-9]+' \
                | sed -E 's/^[Nn]umber:[[:space:]]*//' \
                | head -1 \
                | tr -d '\r[:space:]')
              if [ -n "$PARSED_MAX" ]; then
                MAX_PAGES="$PARSED_MAX"
              fi
            fi
            echo "url=$URL"              >> "$GITHUB_OUTPUT"
            echo "site=$SITE"            >> "$GITHUB_OUTPUT"
            echo "notes=$NOTES"          >> "$GITHUB_OUTPUT"
            echo "max_pages=$MAX_PAGES"  >> "$GITHUB_OUTPUT"
            echo "skip=false"            >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # 5. Comment on the issue when the URL cannot be resolved
      # -----------------------------------------------------------------------
      - name: Comment – URL not found
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: ${{ matrix.issue_number }},
              body: [
                `❌ **Scan skipped** for issue: \`${process.env.ISSUE_TITLE}\`.`,
                ``,
                `Could not extract a valid URL from the issue title or body.`,
                `Please use the format \`SCAN: https://example.com\` and reopen the issue.`,
              ].join('\n'),
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: ${{ matrix.issue_number }},
                name: 'scan-queued',
              });
            } catch (_) {}
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: ${{ matrix.issue_number }},
                labels: ['scan-failed'],
              });
            } catch (_) {}

      # -----------------------------------------------------------------------
      # 6. Acknowledge the scan is starting
      # -----------------------------------------------------------------------
      - name: Comment – scan starting
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        uses: actions/github-script@v7
        env:
          CRAWL_URL: ${{ steps.params.outputs.url }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: ${{ matrix.issue_number }},
              body: [
                `🔍 **Crawl starting** for \`${process.env.CRAWL_URL}\`.`,
                ``,
                `The site is being crawled for PDF files. Accessibility analysis will follow automatically.`,
              ].join('\n'),
            });
            // Swap the queued label for the in-progress label.
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: ${{ matrix.issue_number }},
                name: 'scan-queued',
              });
            } catch (_) {}
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: ${{ matrix.issue_number }},
                labels: ['scan-in-progress'],
              });
            } catch (_) {}

      # -----------------------------------------------------------------------
      # 7. Python setup
      # -----------------------------------------------------------------------
      - name: Set up Python
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 8. Pull latest manifest before crawling
      # -----------------------------------------------------------------------
      - name: Pull latest manifest
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        run: |
          git pull --rebase origin "${{ github.ref_name }}" || true

      # -----------------------------------------------------------------------
      # 9. Run the PDF crawler
      # -----------------------------------------------------------------------
      - name: Run PDF crawler
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        env:
          CRAWL_URL:       ${{ steps.params.outputs.url }}
          CRAWL_NOTES:     ${{ steps.params.outputs.notes }}
          CRAWL_MAX_PAGES: ${{ steps.params.outputs.max_pages }}
        run: |
          NOTES_ARGS=()
          if [ -n "$CRAWL_NOTES" ]; then
            NOTES_ARGS=(--notes "$CRAWL_NOTES")
          fi
          python scripts/crawl.py \
            --url "$CRAWL_URL" \
            --manifest reports/manifest.yaml \
            --output-dir crawled_files \
            --timeout 3600 \
            --max-pages "$CRAWL_MAX_PAGES" \
            "${NOTES_ARGS[@]}"

      # -----------------------------------------------------------------------
      # 10. Commit the updated manifest
      # -----------------------------------------------------------------------
      - name: Commit updated manifest
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        env:
          CRAWL_URL: ${{ steps.params.outputs.url }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f reports/manifest.yaml ] && git add reports/manifest.yaml || true
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: update manifest after crawl of $CRAWL_URL"
            for attempt in 1 2 3; do
              git push && break
              echo "Push attempt $attempt failed – pulling and retrying…"
              git pull --rebase origin "${{ github.ref_name }}"
            done
          fi

      # -----------------------------------------------------------------------
      # 11. Comment that the crawl finished and analysis is beginning
      # -----------------------------------------------------------------------
      - name: Comment – crawl complete, analysis starting
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        uses: actions/github-script@v7
        env:
          CRAWL_URL: ${{ steps.params.outputs.url }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: ${{ matrix.issue_number }},
              body: `✅ **Crawl complete** for \`${process.env.CRAWL_URL}\`.\n\nThe manifest has been updated. Accessibility analysis is now running and results will be posted here when ready.`,
            });

      # -----------------------------------------------------------------------
      # 12. Analyse PDFs for accessibility issues
      # -----------------------------------------------------------------------
      - name: Analyse PDFs for accessibility issues
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        env:
          CRAWL_SITE: ${{ steps.params.outputs.site }}
        run: |
          SITE_FLAG=""
          if [ -n "$CRAWL_SITE" ]; then
            SITE_FLAG="--site $CRAWL_SITE"
          fi
          python scripts/pdf_analyser.py \
            --manifest reports/manifest.yaml \
            --crawled-dir crawled_files \
            $SITE_FLAG

      # -----------------------------------------------------------------------
      # 13. Generate accessibility reports
      # -----------------------------------------------------------------------
      - name: Generate accessibility reports
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        id: report
        env:
          CRAWL_URL:  ${{ steps.params.outputs.url }}
          CRAWL_SITE: ${{ steps.params.outputs.site }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME:  ${{ github.event.repository.name }}
          RUN_ID:     ${{ github.run_id }}
        run: |
          PAGES_BASE="https://${REPO_OWNER}.github.io/${REPO_NAME}"
          RUN_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}/actions/runs/${RUN_ID}"
          SITE_FLAG=""
          COMMENT_FLAG=""
          COMMENT_FILE=""
          if [ -n "$CRAWL_SITE" ]; then
            SITE_FLAG="--site $CRAWL_SITE"
            # Use RUNNER_TEMP (isolated per job) rather than /tmp for the
            # temporary comment body file to avoid predictable-path issues.
            COMMENT_FILE="${RUNNER_TEMP}/issue_comment_${{ matrix.issue_number }}.md"
            COMMENT_FLAG="--issue-comment-file ${COMMENT_FILE}"
            echo "comment_file=${COMMENT_FILE}" >> "$GITHUB_OUTPUT"
          fi
          python scripts/generate_report.py \
            --manifest reports/manifest.yaml \
            --report-dir reports \
            $SITE_FLAG \
            $COMMENT_FLAG \
            --html-dir docs \
            --archive-dir docs/reports \
            --pages-base "$PAGES_BASE" \
            --run-url "$RUN_URL" \
            --crawl-url "$CRAWL_URL"

      # -----------------------------------------------------------------------
      # 14. Commit updated reports
      # -----------------------------------------------------------------------
      - name: Commit updated reports
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/report.html docs/reports.html docs/reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update accessibility reports"
            for attempt in 1 2 3; do
              git push && break
              echo "Push attempt $attempt failed – pulling and retrying…"
              git pull --rebase origin "${{ github.ref_name }}"
            done
          fi

      # -----------------------------------------------------------------------
      # 15. Comment analysis results on the issue and close it
      # -----------------------------------------------------------------------
      - name: Comment analysis results and close issue
        if: >-
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip == 'false'
        uses: actions/github-script@v7
        env:
          CRAWL_URL:    ${{ steps.params.outputs.url }}
          REPO_OWNER:   ${{ github.repository_owner }}
          REPO_NAME:    ${{ github.event.repository.name }}
          RUN_ID:       ${{ github.run_id }}
          ISSUE_NUMBER: ${{ matrix.issue_number }}
          COMMENT_FILE: ${{ steps.report.outputs.comment_file }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            const crawlUrl    = process.env.CRAWL_URL;
            const repoOwner   = process.env.REPO_OWNER;
            const repoName    = process.env.REPO_NAME;
            const runId       = process.env.RUN_ID;
            const commentFile = process.env.COMMENT_FILE;

            const reportsBase = `https://${repoOwner}.github.io/${repoName}`;
            const actionsUrl  = `https://github.com/${repoOwner}/${repoName}/actions/runs/${runId}`;

            // Use the pre-generated per-site comment body if available.
            let body;
            if (commentFile) {
              try {
                const fs = require('fs');
                body = fs.readFileSync(commentFile, 'utf8');
              } catch (_) {}
            }
            if (!body) {
              body = [
                `📊 **Accessibility analysis complete** for \`${crawlUrl}\`.`,
                ``,
                `**Reports:**`,
                `- [HTML report](${reportsBase}/report.html)`,
                `- [Reports history](${reportsBase}/reports.html)`,
                `- [Markdown report](${reportsBase}/reports/report.md)`,
                `- [JSON report](${reportsBase}/reports/report.json)`,
                `- [YAML manifest](${reportsBase}/reports/manifest.yaml)`,
                ``,
                `[View workflow run](${actionsUrl})`,
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: repoOwner,
              repo:  repoName,
              issue_number: issueNumber,
              body,
            });

            // Replace the in-progress label with scan-complete.
            try {
              await github.rest.issues.removeLabel({
                owner: repoOwner,
                repo:  repoName,
                issue_number: issueNumber,
                name: 'scan-in-progress',
              });
            } catch (err) {
              if (err.status !== 404) throw err;
            }
            try {
              await github.rest.issues.addLabels({
                owner: repoOwner,
                repo:  repoName,
                issue_number: issueNumber,
                labels: ['scan-complete'],
              });
            } catch (_) {}

            // Close the issue as completed.
            await github.rest.issues.update({
              owner: repoOwner,
              repo:  repoName,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed',
            });

      # -----------------------------------------------------------------------
      # 16. Handle unexpected failures and timeouts for this issue
      # -----------------------------------------------------------------------
      - name: Comment – scan failed unexpectedly
        if: >-
          (failure() || cancelled()) &&
          steps.issue.outputs.state == 'open' &&
          steps.params.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          CRAWL_URL:        ${{ steps.params.outputs.url }}
          RUN_URL:          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CURRENT_MAX_PAGES: ${{ steps.params.outputs.max_pages }}
        with:
          script: |
            const crawlUrl        = process.env.CRAWL_URL || '(unknown)';
            const runUrl          = process.env.RUN_URL;
            const currentMaxPages = parseInt(process.env.CURRENT_MAX_PAGES, 10) || 2500;
            const newMaxPages     = Math.max(100, Math.floor(currentMaxPages / 2));

            // Update the issue body to reduce the Number: capture limit so that
            // a retry is more likely to complete within the time budget.
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: ${{ matrix.issue_number }},
            });
            let body = issue.body || '';
            if (/^Number:\s*\d+/mi.test(body)) {
              body = body.replace(/^Number:\s*\d+/mi, `Number: ${newMaxPages}`);
            } else {
              body = body.trim() + `\nNumber: ${newMaxPages}`;
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: ${{ matrix.issue_number }},
              body,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: ${{ matrix.issue_number }},
              body: [
                `❌ **Scan failed** for \`${crawlUrl}\`.`,
                ``,
                `An unexpected error occurred (possibly a timeout). Please check the [workflow run](${runUrl}) for details.`,
                ``,
                `To help the next attempt succeed, the capture limit has been automatically`,
                `reduced to **${newMaxPages} pages** (was ${currentMaxPages}).`,
                `Close and reopen this issue to retry with the smaller batch size.`,
              ].join('\n'),
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: ${{ matrix.issue_number }},
                name: 'scan-in-progress',
              });
            } catch (_) {}
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: ${{ matrix.issue_number }},
                name: 'scan-queued',
              });
            } catch (_) {}
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: ${{ matrix.issue_number }},
                labels: ['scan-failed'],
              });
            } catch (_) {}
